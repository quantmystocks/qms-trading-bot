name: Trading Bot (Environments)

on:
  schedule:
    # Run multiple times on Monday so one run executes at 9:30 AM ET, rest reconcile or exit (already done)
    # 9:30 AM EDT = 13:30 UTC (March-November); 9:30 AM EST = 14:30 UTC (November-March)
    # Every 5 min in both possible windows: only the run at 9:30 AM ET executes trades; others reconcile or "already completed today"
    - cron: '30 13 * * 1'
    - cron: '35 13 * * 1'
    - cron: '40 13 * * 1'
    - cron: '45 13 * * 1'
    - cron: '50 13 * * 1'
    - cron: '55 13 * * 1'
    - cron: '0 14 * * 1'
    - cron: '30 14 * * 1'
    - cron: '35 14 * * 1'
    - cron: '40 14 * * 1'
    - cron: '45 14 * * 1'
    - cron: '50 14 * * 1'
    - cron: '55 14 * * 1'
    - cron: '0 15 * * 1'
  workflow_dispatch:
    inputs:
      # Environment name (no list in repo). Run locally: python scripts/setup.py --github --list
      environment:
        description: 'Environment name (e.g. paper, live)'
        required: true
        type: string
        default: 'paper'
      force_run:
        description: 'Execute trades (true) or dry-run (false)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  # Scheduled runs: fan out across all active environments
  setup_matrix:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    outputs:
      environments: ${{ steps.parse.outputs.environments }}
      has_environments: ${{ steps.parse.outputs.has_environments }}
    steps:
      - id: parse
        run: |
          RAW="${{ vars.ACTIVE_ENVIRONMENTS }}"
          if [ -z "$RAW" ]; then
            echo "has_environments=false" >> $GITHUB_OUTPUT
            echo "environments=[]" >> $GITHUB_OUTPUT
          else
            ENVS=$(echo "$RAW" | jq -R 'split(",") | map(select(length > 0) | gsub("^\\s+|\\s+$"; ""))')
            echo "has_environments=true" >> $GITHUB_OUTPUT
            echo "environments=$ENVS" >> $GITHUB_OUTPUT
          fi

  rebalance_scheduled:
    needs: setup_matrix
    if: github.event_name == 'schedule' && needs.setup_matrix.outputs.has_environments == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJSON(needs.setup_matrix.outputs.environments) }}
    environment: ${{ matrix.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run trading bot (${{ matrix.environment }})
        env:
          LEADERBOARD_API_URL: ${{ secrets.LEADERBOARD_API_URL }}
          LEADERBOARD_API_TOKEN: ${{ secrets.LEADERBOARD_API_TOKEN }}
          BROKER_TYPE: ${{ vars.BROKER_TYPE }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL: ${{ vars.ALPACA_BASE_URL }}
          ROBINHOOD_USERNAME: ${{ secrets.ROBINHOOD_USERNAME }}
          ROBINHOOD_PASSWORD: ${{ secrets.ROBINHOOD_PASSWORD }}
          ROBINHOOD_MFA_CODE: ${{ secrets.ROBINHOOD_MFA_CODE }}
          WEBULL_APP_KEY: ${{ secrets.WEBULL_APP_KEY }}
          WEBULL_APP_SECRET: ${{ secrets.WEBULL_APP_SECRET }}
          WEBULL_ACCOUNT_ID: ${{ vars.WEBULL_ACCOUNT_ID }}
          WEBULL_REGION: ${{ vars.WEBULL_REGION }}
          TRADIER_ACCESS_TOKEN: ${{ secrets.TRADIER_ACCESS_TOKEN }}
          TRADIER_ACCOUNT_ID: ${{ secrets.TRADIER_ACCOUNT_ID }}
          TRADIER_BASE_URL: ${{ vars.TRADIER_BASE_URL }}
          INITIAL_CAPITAL: ${{ vars.INITIAL_CAPITAL }}
          TRADE_INDICES: ${{ vars.TRADE_INDICES }}
          INITIAL_CAPITAL_SP400: ${{ vars.INITIAL_CAPITAL_SP400 }}
          INITIAL_CAPITAL_SP500: ${{ vars.INITIAL_CAPITAL_SP500 }}
          INITIAL_CAPITAL_SP600: ${{ vars.INITIAL_CAPITAL_SP600 }}
          INITIAL_CAPITAL_NDX: ${{ vars.INITIAL_CAPITAL_NDX }}
          SCHEDULER_MODE: external
          FORCE_RUN: ${{ vars.FORCE_RUN || 'false' }}
          EMAIL_ENABLED: ${{ vars.EMAIL_ENABLED }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_PROVIDER: ${{ vars.EMAIL_PROVIDER }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          PERSISTENCE_ENABLED: ${{ vars.PERSISTENCE_ENABLED }}
          FIRESTORE_DATABASE: ${{ vars.FIRESTORE_DATABASE }}
          ENVIRONMENT: ${{ matrix.environment }}
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 8
          max_attempts: 3
          retry_wait_seconds: 60
          command: |
            python -c "
            from src.main import TradingBot
            bot = TradingBot()
            bot.initialize()
            bot._execute_rebalancing()
            "

      - name: Upload logs (if job fails)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-${{ matrix.environment }}
          path: |
            *.log
            logs/
          if-no-files-found: ignore

  # Manual runs: single environment
  rebalance_manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run trading bot (${{ inputs.environment }})
        env:
          LEADERBOARD_API_URL: ${{ secrets.LEADERBOARD_API_URL }}
          LEADERBOARD_API_TOKEN: ${{ secrets.LEADERBOARD_API_TOKEN }}
          BROKER_TYPE: ${{ vars.BROKER_TYPE }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL: ${{ vars.ALPACA_BASE_URL }}
          ROBINHOOD_USERNAME: ${{ secrets.ROBINHOOD_USERNAME }}
          ROBINHOOD_PASSWORD: ${{ secrets.ROBINHOOD_PASSWORD }}
          ROBINHOOD_MFA_CODE: ${{ secrets.ROBINHOOD_MFA_CODE }}
          WEBULL_APP_KEY: ${{ secrets.WEBULL_APP_KEY }}
          WEBULL_APP_SECRET: ${{ secrets.WEBULL_APP_SECRET }}
          WEBULL_ACCOUNT_ID: ${{ vars.WEBULL_ACCOUNT_ID }}
          WEBULL_REGION: ${{ vars.WEBULL_REGION }}
          TRADIER_ACCESS_TOKEN: ${{ secrets.TRADIER_ACCESS_TOKEN }}
          TRADIER_ACCOUNT_ID: ${{ secrets.TRADIER_ACCOUNT_ID }}
          TRADIER_BASE_URL: ${{ vars.TRADIER_BASE_URL }}
          INITIAL_CAPITAL: ${{ vars.INITIAL_CAPITAL }}
          TRADE_INDICES: ${{ vars.TRADE_INDICES }}
          INITIAL_CAPITAL_SP400: ${{ vars.INITIAL_CAPITAL_SP400 }}
          INITIAL_CAPITAL_SP500: ${{ vars.INITIAL_CAPITAL_SP500 }}
          INITIAL_CAPITAL_SP600: ${{ vars.INITIAL_CAPITAL_SP600 }}
          INITIAL_CAPITAL_NDX: ${{ vars.INITIAL_CAPITAL_NDX }}
          SCHEDULER_MODE: external
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force_run || vars.FORCE_RUN || 'false' }}
          EMAIL_ENABLED: ${{ vars.EMAIL_ENABLED }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_PROVIDER: ${{ vars.EMAIL_PROVIDER }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          PERSISTENCE_ENABLED: ${{ vars.PERSISTENCE_ENABLED }}
          FIRESTORE_DATABASE: ${{ vars.FIRESTORE_DATABASE }}
          ENVIRONMENT: ${{ inputs.environment }}
        uses: nick-fields/retry@v2
        with:
          timeout_minutes: 8
          max_attempts: 3
          retry_wait_seconds: 60
          command: |
            python -c "
            from src.main import TradingBot
            bot = TradingBot()
            bot.initialize()
            bot._execute_rebalancing()
            "

      - name: Upload logs (if job fails)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-${{ inputs.environment }}
          path: |
            *.log
            logs/
          if-no-files-found: ignore
